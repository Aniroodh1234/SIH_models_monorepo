# ===========================================================================
#  SwarajDesk NGINX Configuration — Dual-Model Reverse Proxy
#  gsc-vision.abhasbehera.in  → Vision_model   (port 8001)
#  gsc-survey.abhasbehera.in  → Report Gen AI  (port 8000)
#
#  SSL: Handled by Cloudflare proxy (NGINX listens on port 80 only)
#  Install: /etc/nginx/sites-available/swarajdesk-models
# ===========================================================================

# =========================
# Survey / Report Service
# =========================
server {
    listen 80;
    server_name gsc-survey.abhasbehera.in;

    # Allow large payloads for report requests + responses
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Preserve original client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── SSE Streaming Support (critical for /survey-report/stream) ──
        # Without these, NGINX buffers the SSE stream and the client
        # receives nothing until the entire response completes.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Tell upstream proxies (Cloudflare) not to buffer either
        add_header X-Accel-Buffering no;
    }
}

# =========================
# Vision Service
# =========================
server {
    listen 80;
    server_name gsc-vision.abhasbehera.in;

    # Allow large image uploads
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # Preserve original client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vision inference can take 10-30s per image (VLM + ViT pipeline)
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }
}
